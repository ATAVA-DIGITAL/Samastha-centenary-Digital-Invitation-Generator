<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samasta Centenary Poster</title>
    <style>
        /* പോസ്റ്ററിന്റെ പ്രധാന ബോക്സ് */
        .poster-container {
            position: relative;
            width: 800px;  /* ഇമേജിന്റെ കൃത്യമായ വീതി ആവശ്യാനുസരണം മാറ്റാം */
            height: 1000px; /* ഇമേജിന്റെ കൃത്യമായ നീളം ആവശ്യാനുസരണം മാറ്റാം */
            background-image: url('bg4.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Gayathri', 'Manjari', sans-serif; /* മലയാളം ഫോണ്ടുകൾ */
            font-weight: bold;
        }

        /* 'പ്രിയപ്പെട്ട' എന്ന് കഴിഞ്ഞിട്ട് വരുന്ന പേര് */
        .guest-name {
            position: absolute;
            top: 512px;       /* മുകളിൽ നിന്നുള്ള ദൂരം (ഇത് അഡ്ജസ്റ്റ് ചെയ്യാം) */
            left: 205px;      /* ഇടത്തുനിന്നുള്ള ദൂരം */
            font-size: 20px;
            color: #8b0000;   /* കടും ചുവപ്പ് നിറം */
            white-space: nowrap;
        }

        /* ഫോട്ടോ വെക്കാനുള്ള റൗണ്ട് സ്പേസ് */
        .photo-space {
            position: absolute;
            bottom: 145px;     /* താഴെ നിന്നുള്ള ദൂരം */
            right: 62px;       /* വലത്തുനിന്നുള്ള ദൂരം */
            width: 172px;      /* വട്ടത്തിന്റെ വീതി */
            height: 172px;     /* വട്ടത്തിന്റെ നീളം */
            border-radius: 50%; /* ഫോട്ടോ കൃത്യം വട്ടത്തിലാക്കാൻ */
            overflow: hidden;
        }

        .photo-space img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ഫോട്ടോയ്ക്ക് താഴെയുള്ള പേരും സ്ഥലവും */
        .details-space {
            position: absolute;
            bottom: 50px;      /* താഴെ നിന്നുള്ള ദൂരം */
            right: 30px;       /* വലത്തുനിന്നുള്ള ദൂരം */
            width: 240px;      /* ടെക്സ്റ്റ് ബോക്സിന്റെ വീതി */
            text-align: center;
            line-height: 1.4;
        }

        .user-name {
            font-size: 20px;
            color: #1a1a1a;
            margin: 0;
        }

        .user-place {
            font-size: 16px;
            color: #555555;
            margin: 2px 0 0 0;
        }
    </style>
</head>
<body>

    <div class="poster-container">
        
        <!-- 'പ്രിയപ്പെട്ട' എന്നതിന് ശേഷം വരേണ്ട പേര് ഇവിടെ നൽകുക -->
        <div class="guest-name">മുഹമ്മദ് റാഫി</div>

        <!-- ഫോട്ടോ ഇവിടെ ചേർക്കുക (user-photo.jpg എന്നതിന് പകരം നിങ്ങളുടെ ഫോട്ടോയുടെ പേര് നൽകുക) -->
        <div class="photo-space">
            <img src="user-photo.jpg" alt="Photo">
        </div>

        <!-- ഫോട്ടോയ്ക്ക് താഴെ വരേണ്ട പേരും സ്ഥലവും ഇവിടെ നൽകുക -->
        <div class="details-space">
            <p class="user-name">പി. കെ. അൻവർ സദാത്</p>
            <p class="user-place">മലപ്പുറം</p>
        </div>

    </div>

</body>
</html>
