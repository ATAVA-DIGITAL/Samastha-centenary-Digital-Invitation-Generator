<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samastha Centenary - Personal Invitation Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Chettan+2:wght@400;600;800&family=Manjari:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', 'Manjari', sans-serif;
            background: radial-gradient(circle at top left, #fbfaf7 0%, #eef1f6 100%);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 px-6 py-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <img src="logo.jpg" alt="Logo" class="h-12 w-12 object-contain rounded-lg shadow-sm" onerror="this.src='https://placehold.co/100x100?text=Logo'">
                <div>
                    <h1 class="text-xl font-bold text-emerald-800 tracking-tight mb-1">Samastha Centenary</h1>
                    <p class="text-xs text-slate-500 font-medium">Personalized Invitation Card Engine</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Controls Panel -->
        <section class="lg:col-span-5 bg-white rounded-2xl border border-slate-200 p-6 shadow-md flex flex-col gap-6">
            <div>
                <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2 mb-1">
                    <i class="fa-solid fa-sliders text-emerald-600"></i> Invitation Details
                </h2>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-2">Full Name (പേര്)</label>
                    <input type="text" id="userName" value="Abdul Salam" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-medium text-slate-700">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-2">Place (വിവരങ്ങൾ)</label>
                    <input type="text" id="userDetails" value="Vazhakkad" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-medium text-slate-700">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-2">Upload Your Photo (ഫോട്ടോ)</label>
                    <div class="relative flex items-center justify-center border-2 border-dashed border-slate-300 bg-slate-50 rounded-xl p-4 cursor-pointer">
                        <input type="file" id="userPhoto" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                        <div class="text-center">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl text-slate-400 mb-1"></i>
                            <p class="text-xs text-slate-600 font-medium">Click to upload photo</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="border-t border-slate-100 pt-5 space-y-5">
                <div class="flex gap-2 p-1 bg-slate-100 rounded-xl">
                    <button onclick="switchTab('photo')" id="tab-photo" class="flex-1 text-xs font-bold py-2 px-3 rounded-lg bg-white text-emerald-800 shadow-sm">Photo Controls</button>
                    <button onclick="switchTab('text')" id="tab-text" class="flex-1 text-xs font-bold py-2 px-3 rounded-lg text-slate-600">Text Controls</button>
                </div>

                <div id="controls-photo" class="space-y-4">
                    <div>
                        <div class="flex justify-between text-xs text-slate-600 mb-1"><span>Photo Zoom</span><span id="scaleVal">1.0x</span></div>
                        <input type="range" id="photoScale" min="0.1" max="3" step="0.05" value="1.0" class="w-full accent-emerald-600">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="flex justify-between text-xs text-slate-600 mb-1"><span>Shift X</span><span id="shiftXVal">0px</span></div>
                            <input type="range" id="photoX" min="-300" max="300" step="1" value="0" class="w-full accent-emerald-600">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs text-slate-600 mb-1"><span>Shift Y</span><span id="shiftYVal">0px</span></div>
                            <input type="range" id="photoY" min="-300" max="300" step="1" value="0" class="w-full accent-emerald-600">
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between text-xs text-slate-600 mb-1"><span>Rotate</span><span id="rotateVal">0°</span></div>
                        <input type="range" id="photoRotate" min="-180" max="180" step="5" value="0" class="w-full accent-emerald-600">
                    </div>
                </div>

                <div id="controls-text" class="space-y-4 hidden">
                    <div>
                        <div class="flex justify-between text-xs text-slate-600 mb-1"><span>Name Pos (X)</span><span id="textXVal">235px</span></div>
                        <input type="range" id="textX" min="100" max="600" step="1" value="235" class="w-full accent-emerald-600">
                    </div>
                    <div>
                        <div class="flex justify-between text-xs text-slate-600 mb-1"><span>Name Pos (Y)</span><span id="textYVal">528px</span></div>
                        <input type="range" id="textY" min="450" max="600" step="1" value="528" class="w-full accent-emerald-600">
                    </div>
                    <div>
                        <div class="flex justify-between text-xs text-slate-600 mb-1"><span>Font Size</span><span id="textSizeVal">24px</span></div>
                        <input type="range" id="textSize" min="16" max="40" step="1" value="24" class="w-full accent-emerald-600">
                    </div>
                </div>
            </div>

            <div class="mt-auto border-t border-slate-100 pt-5">
                <button onclick="downloadPoster()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-emerald-600/20 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-circle-down text-lg"></i> Download High-Res Invitation
                </button>
            </div>
        </section>

        <!-- Preview Panel -->
        <section class="lg:col-span-7 flex flex-col gap-4">
            <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-md flex flex-col items-center justify-center">
                <div class="flex justify-between items-center w-full mb-3 px-2">
                    <span class="text-xs font-bold uppercase text-slate-400 flex items-center gap-1.5">
                        <span class="h-2.5 w-2.5 bg-emerald-500 rounded-full"></span> Dynamic Preview
                    </span>
                    <button onclick="resetControls()" class="text-xs font-semibold text-slate-500 hover:text-emerald-700">Reset Positions</button>
                </div>
                
                <div class="w-full overflow-hidden bg-slate-50 rounded-xl border border-slate-100 p-2 flex items-center justify-center">
                    <canvas id="posterCanvas" class="max-w-full h-auto rounded-lg shadow-inner bg-slate-200"></canvas>
                </div>
            </div>

            <footer class="bg-emerald-950 text-emerald-100/80 text-center py-4 px-6 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-3 text-xs">
                <div>Developed by <strong class="text-white">ATAVA DIGITAL SERVICES & TRADING</strong></div>
                <div class="text-emerald-300 font-semibold">Abdul Salam Ahsani Vazhakkad</div>
            </footer>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('posterCanvas');
        const ctx = canvas.getContext('2d');

        let bgImg = new Image();
        let uploadedPhoto = null;

        // Image template source point
        const templateSrc = 'bg4.jpg'; 

        window.addEventListener('DOMContentLoaded', () => {
            // Set basic canvas layout first so it doesn't look blank at start
            canvas.width = 1000;
            canvas.height = 1250;
            renderPlaceholderBackground();
            
            // Trigger background load
            bgImg.crossOrigin = "anonymous";
            bgImg.src = templateSrc;
            bgImg.onload = () => {
                canvas.width = bgImg.naturalWidth || bgImg.width;
                canvas.height = bgImg.naturalHeight || bgImg.height;
                draw();
            };
            bgImg.onerror = () => {
                console.log("Template standard load failed, running custom fallback canvas framework.");
                draw();
            };

            setupEventListeners();
        });

        function renderPlaceholderBackground() {
            ctx.fillStyle = '#f1f5f9';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#94a3b8';
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Loading Template Image...", canvas.width/2, canvas.height/2);
        }

        function setupEventListeners() {
            const controls = ['userName', 'userDetails', 'photoScale', 'photoX', 'photoY', 'photoRotate', 'textX', 'textY', 'textSize'];
            controls.forEach(id => {
                document.getElementById(id).addEventListener('input', () => {
                    updateControlValueLabels();
                    draw();
                });
            });

            document.getElementById('userPhoto').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        uploadedPhoto = new Image();
                        uploadedPhoto.onload = () => {
                            draw();
                        };
                        uploadedPhoto.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function updateControlValueLabels() {
            document.getElementById('scaleVal').innerText = document.getElementById('photoScale').value + 'x';
            document.getElementById('shiftXVal').innerText = document.getElementById('photoX').value + 'px';
            document.getElementById('shiftYVal').innerText = document.getElementById('photoY').value + 'px';
            document.getElementById('rotateVal').innerText = document.getElementById('photoRotate').value + '°';
            document.getElementById('textXVal').innerText = document.getElementById('textX').value + 'px';
            document.getElementById('textYVal').innerText = document.getElementById('textY').value + 'px';
            document.getElementById('textSizeVal').innerText = document.getElementById('textSize').value + 'px';
        }

        function resetControls() {
            document.getElementById('photoScale').value = 1.0;
            document.getElementById('photoX').value = 0;
            document.getElementById('photoY').value = 0;
            document.getElementById('photoRotate').value = 0;
            document.getElementById('textX').value = 235;
            document.getElementById('textY').value = 528;
            document.getElementById('textSize').value = 24;
            updateControlValueLabels();
            draw();
        }

        function switchTab(type) {
            const photoBtn = document.getElementById('tab-photo');
            const textBtn = document.getElementById('tab-text');
            const photoSec = document.getElementById('controls-photo');
            const textSec = document.getElementById('controls-text');

            if (type === 'photo') {
                photoBtn.className = "flex-1 text-xs font-bold py-2 px-3 rounded-lg bg-white text-emerald-800 shadow-sm";
                textBtn.className = "flex-1 text-xs font-bold py-2 px-3 rounded-lg text-slate-600";
                photoSec.classList.remove('hidden');
                textSec.classList.add('hidden');
            } else {
                textBtn.className = "flex-1 text-xs font-bold py-2 px-3 rounded-lg bg-white text-emerald-800 shadow-sm";
                photoBtn.className = "flex-1 text-xs font-bold py-2 px-3 rounded-lg text-slate-600";
                textSec.classList.remove('hidden');
                photoSec.classList.add('hidden');
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Template Background if loaded, else use clean white base layout
            if (bgImg && bgImg.complete && bgImg.naturalWidth !== 0) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#fffdf9';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ef4444';
                ctx.font = "bold 20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("⚠️ bg4.jpg not found in folder! Please check file name.", canvas.width/2, 40);
            }

            const scaleFactorX = canvas.width / 1000;
            const scaleFactorY = canvas.height / 1250;

            const userNameVal = document.getElementById('userName').value.trim();
            const userDetailsVal = document.getElementById('userDetails').value.trim();

            // 2. Render Name beside "Priyappetta"
            if (userNameVal) {
                const textX = parseFloat(document.getElementById('textX').value) * scaleFactorX;
                const textY = parseFloat(document.getElementById('textY').value) * scaleFactorY;
                const textSize = parseInt(document.getElementById('textSize').value) * scaleFactorX;

                ctx.save();
                ctx.font = `700 ${textSize}px 'Baloo Chettan 2', 'Manjari', sans-serif`;
                ctx.fillStyle = '#a31d1d';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText(userNameVal, textX, textY);
                ctx.restore();
            }

            // 3. Draw Dotted Circle Photo frame
            const circleCenterX = 810 * scaleFactorX;
            const circleCenterY = 705 * scaleFactorY;
            const circleRadius = 115 * scaleFactorX;

            if (uploadedPhoto && uploadedPhoto.complete) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(circleCenterX, circleCenterY, circleRadius, 0, Math.PI * 2, true);
                ctx.closePath();
                ctx.clip();

                const photoScale = parseFloat(document.getElementById('photoScale').value);
                const photoX = parseFloat(document.getElementById('photoX').value) * scaleFactorX;
                const photoY = parseFloat(document.getElementById('photoY').value) * scaleFactorY;
                const photoRotate = parseFloat(document.getElementById('photoRotate').value) * Math.PI / 180;

                ctx.translate(circleCenterX + photoX, circleCenterY + photoY);
                ctx.rotate(photoRotate);

                const imgWidth = uploadedPhoto.width;
                const imgHeight = uploadedPhoto.height;
                const ratio = Math.max((circleRadius * 2) / imgWidth, (circleRadius * 2) / imgHeight) * photoScale;

                const drawWidth = imgWidth * ratio;
                const drawHeight = imgHeight * ratio;

                ctx.drawImage(uploadedPhoto, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
                ctx.restore();
            }

            // 4. Draw Name & Place details under the circle
            const textBaseY = (circleCenterY + circleRadius) + (35 * scaleFactorY);
            
            if (userNameVal) {
                ctx.save();
                ctx.font = `700 ${26 * scaleFactorX}px 'Baloo Chettan 2', 'Manjari', sans-serif`;
                ctx.fillStyle = '#1e293b';
                ctx.textAlign = 'center';
                ctx.fillText(userNameVal, circleCenterX, textBaseY);
                ctx.restore();
            }

            if (userDetailsVal) {
                ctx.save();
                ctx.font = `600 ${18 * scaleFactorX}px 'Baloo Chettan 2', 'Manjari', sans-serif`;
                ctx.fillStyle = '#64748b';
                ctx.textAlign = 'center';
                ctx.fillText(userDetailsVal, circleCenterX, textBaseY + (32 * scaleFactorY));
                ctx.restore();
            }

            // 5. Dynamic Footer Branding
            ctx.save();
            ctx.font = "bold 13px 'Poppins', Arial, sans-serif";
            ctx.fillStyle = "rgba(100, 116, 139, 0.8)";
            ctx.textAlign = "left";
            ctx.fillText("Developed by ATAVA DIGITAL SERVICES & TRADING • Abdul Salam Ahsani Vazhakkad", 45 * scaleFactorX, canvas.height - (30 * scaleFactorY));
            ctx.restore();
        }

        function downloadPoster() {
            const name = document.getElementById('userName').value.trim() || 'Invitation';
            const cleanName = name.replace(/[^a-zA-Z0-9]/g, "_");
            const dataURL = canvas.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = `Samastha_Centenary_Invite_${cleanName}.png`;
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
