<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samastha Centenary Invitation Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f0e1 0%, #e8dec9 100%);
            --primary-gold: #c5a03b;
            --dark-brown: #2c2519;
            --samastha-green: #198754;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-gradient); color: var(--dark-brown); min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .container { background: var(--card-bg); width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 3px solid var(--primary-gold); text-align: center; }
        
        /* Centenary Header Elements */
        .header-zone { margin-bottom: 25px; position: relative; }
        .centenary-logo { width: 100px; height: auto; margin-bottom: 10px; border-radius: 5px; }
        h1 { font-size: 1.8rem; font-weight: 900; color: #a12328; margin-bottom: 5px; letter-spacing: 0.5px; }
        p.subtitle { font-size: 1.1rem; font-weight: 700; color: var(--samastha-green); margin-bottom: 15px; }
        
        .divider { height: 2px; background: linear-gradient(to right, transparent, var(--primary-gold), transparent); margin-bottom: 20px; }

        /* Form Components */
        .form-group { text-align: left; margin-bottom: 18px; }
        .form-group label { display: block; font-size: 1rem; font-weight: 700; margin-bottom: 6px; color: var(--dark-brown); }
        .form-group input { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 1.1rem; font-weight: 600; background: #faf9f5; transition: 0.2s; }
        .form-group input:focus { outline: none; border-color: var(--primary-gold); background: #fff; }

        /* Custom Modern File Upload */
        .file-upload-wrapper { border: 2px dashed var(--primary-gold); background: #fdfbf7; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.2s; margin-bottom: 20px; }
        .file-upload-wrapper:hover { background: #f7f2e5; }
        .file-upload-wrapper i { font-size: 2rem; color: var(--primary-gold); margin-bottom: 8px; }
        .file-upload-wrapper p { font-size: 0.95rem; font-weight: bold; color: var(--dark-brown); }
        #photoInput { display: none; }

        /* Action Buttons */
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-generate { background: linear-gradient(135deg, #c5a03b 0%, #aa842c 100%); color: #fff; }
        .btn-generate:hover { transform: translateY(-2px); }
        .btn-download { background: linear-gradient(135deg, #198754 0%, #11623c 100%); color: #fff; margin-top: 15px; display: none; }

        /* Preview Window Container */
        .preview-zone { margin-top: 25px; display: none; }
        .preview-zone h3 { font-size: 1.2rem; margin-bottom: 10px; color: var(--dark-brown); font-weight: 800; }
        canvas { width: 100%; border-radius: 12px; border: 2px solid var(--primary-gold); box-shadow: 0 8px 20px rgba(0,0,0,0.15); display: block; }

        /* Footer Branding */
        .footer-tag { margin-top: 25px; font-size: 0.9rem; font-weight: bold; color: #5c5343; line-height: 1.5; border-top: 1px dashed var(--primary-gold); padding-top: 15px; }
        .author-name { color: #a12328; font-weight: 800; font-size: 1rem; margin-top: 3px; display: inline-block; letter-spacing: 0.3px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <div class="header-zone">
            <!-- ഒറിജിനൽ ലോഗോ ഇമേജ് ഇവിടെ കാണിക്കും -->
            <img src="logo.png" class="centenary-logo" alt="Samastha Centenary Logo" onerror="this.style.display='none'">
            <h1>SAMASTHA CENTENARY</h1>
            <p class="subtitle">100-ാം വാർഷിക സന്ദേശ കവാടം</p>
            <div class="divider"></div>
        </div>

        <!-- INPUT FIELDS -->
        <div class="form-group">
            <label><i class="fa-solid fa-user"></i> പൂർണ്ണമായ പേര് (Name)</label>
            <input type="text" id="userName" placeholder="e.g. അബ്ദുല്ല കെ.പി">
        </div>

        <div class="form-group">
            <label><i class="fa-solid fa-location-dot"></i> സ്ഥലം (Place)</label>
            <input type="text" id="userPlace" placeholder="e.g. മലപ്പുറം">
        </div>

        <!-- PHOTO UPLOADER BOX -->
        <label><i class="fa-solid fa-camera"></i> നിങ്ങളുടെ ഫോട്ടോ (Upload Photo)</label>
        <div class="file-upload-wrapper" onclick="document.getElementById('photoInput').click()">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <p id="uploadStatusText">ക്ലിക്ക് ചെയ്ത് ഫോട്ടോ തിരഞ്ഞെടുക്കുക</p>
            <input type="file" id="photoInput" accept="image/*" onchange="handleFileSelect(event)">
        </div>

        <!-- BUTTONS -->
        <button class="btn btn-generate" onclick="generateInvitation()"><i class="fa-solid fa-wand-magic-sparkles"></i> INVITATION ഉണ്ടാക്കൂ</button>
        <button class="btn btn-download" id="downloadBtn" onclick="downloadImage()"><i class="fa-solid fa-download"></i> ഗാലറിയിലേക്ക് ഡൗൺലോഡ് ചെയ്യുക</button>

        <!-- LIVE IMAGE CANVAS PREVIEW -->
        <div class="preview-zone" id="previewArea">
            <div class="divider" style="margin-top: 20px;"></div>
            <h3>നിങ്ങളുടെ ഡിജിറ്റൽ ക്ഷണക്കത്ത്:</h3>
            <canvas id="inviteCanvas" width="800" height="1000"></canvas>
        </div>

        <!-- BRANDING FOOTER -->
        <div class="footer-tag">
            Developed by ATAVA DIGITAL SERVICES & TRADING <br>
            <span class="author-name">Abdul Salam Ahsani Vazhakkad</span>
        </div>
    </div>

<script>
    let uploadedImageBase64 = null;
    const logoImg = new Image();
    logoImg.src = 'logo.png'; // ഒറിജിനൽ ലോഗോ ഫയൽ പാത്ത്

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (file) {
            document.getElementById('uploadStatusText').innerText = "ഫോട്ടോ റെഡിയാണ്: " + file.name;
            document.getElementById('uploadStatusText').style.color = "var(--samastha-green)";
            
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImageBase64 = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    function generateInvitation() {
        const name = document.getElementById('userName').value.trim();
        const place = document.getElementById('userPlace').value.trim();
        const canvas = document.getElementById('inviteCanvas');
        const ctx = canvas.getContext('2d');

        if(!name || !place) {
            alert("ദയവായി പേരും സ്ഥലവും കൃത്യമായി ടൈപ്പ് ചെയ്യുക ബ്രോ!");
            return;
        }
        if(!uploadedImageBase64) {
            alert("ക്ഷണക്കത്തിൽ വെക്കാൻ ഒരു അടിപൊളി ഫോട്ടോ കൂടി അപ്‌ലോഡ് ചെയ്യ് ബ്രോ!");
            return;
        }

        document.getElementById('previewArea').style.display = 'block';

        // 1. പശ്ചാത്തലം സെറ്റ് ചെയ്യൽ
        ctx.fillStyle = '#fbf9f3';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. ഗോൾഡൻ റീഥ് ബോർഡർ
        ctx.strokeStyle = '#c5a03b';
        ctx.lineWidth = 10;
        ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
        ctx.lineWidth = 2;
        ctx.strokeRect(32, 32, canvas.width - 64, canvas.height - 64);

        // 3. കാർഡിന്റെ മുകളിൽ ഒറിജിനൽ ലോഗോ കൃത്യമായി വരയ്ക്കുന്നു
        try {
            ctx.drawImage(logoImg, 350, 50, 100, 100);
        } catch(e) {
            console.log("Logo image loading issue");
        }

        // 4. മുകളിലെ തലക്കെട്ടുകൾ (ലോഗോയ്ക്ക് താഴെയായി അഡ്ജസ്റ്റ് ചെയ്തത്)
        ctx.fillStyle = '#831a1e'; 
        ctx.font = '900 32px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText("جمعية العلماء بعമوم كيرلا", 400, 190);

        ctx.fillStyle = '#2c2519';
        ctx.font = 'bold 22px sans-serif';
        ctx.fillText("SAMASTHA KERALA JAM'IYYATHUL ULAMA", 400, 230);

        // 5. സെന്റിനറി ബാനർ
        ctx.fillStyle = '#198754'; 
        ctx.fillRect(230, 260, 340, 55);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 24px sans-serif';
        ctx.fillText("100-ാം പ്രകാശ വർഷങ്ങൾ", 400, 295);

        // 6. ഫോട്ടോ ഫ്രെയിം ലോഡിങ്
        const userImg = new Image();
        userImg.src = uploadedImageBase64;
        userImg.onload = function() {
            ctx.save();
            ctx.beginPath();
            ctx.arc(400, 470, 120, 0, Math.PI * 2); 
            ctx.clip();
            ctx.drawImage(userImg, 280, 350, 240, 240);
            ctx.restore();

            // ഗോൾഡൻ റിങ് ഫോർ ഫോട്ടോ
            ctx.strokeStyle = '#c5a03b';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(400, 470, 122, 0, Math.PI * 2);
            ctx.stroke();

            // 7. ടെക്സ്റ്റ് പ്രിന്റിങ്
            ctx.fillStyle = '#2c2519';
            ctx.font = '800 36px sans-serif';
            ctx.fillText(name, 400, 650); 

            ctx.fillStyle = '#c5a03b';
            ctx.font = '700 24px sans-serif';
            ctx.fillText("(" + place + ")", 400, 690); 

            ctx.fillStyle = '#443a29';
            ctx.font = 'bold 24px sans-serif';
            ctx.fillText("സെന്റിനറി ചരിത്ര സദസ്സിലേക്ക്", 400, 750);
            ctx.font = '900 36px sans-serif';
            ctx.fillStyle = '#198754';
            ctx.fillText("നിങ്ങളെ ആദരവോടെ ക്ഷണിക്കുന്നു!", 400, 800);

            // 8. തീയതിയും വേദിയും ബോക്സ്
            ctx.fillStyle = '#faf6ed';
            ctx.fillRect(80, 840, 640, 110);
            ctx.strokeStyle = '#e2d4b7';
            ctx.lineWidth = 2;
            ctx.strokeRect(80, 840, 640, 110);

            ctx.fillStyle = '#831a1e';
            ctx.font = 'bold 23px sans-serif';
            ctx.fillText("2027 ജനുവരി 28, 29, 30, 31", 400, 885);
            ctx.fillStyle = '#2c2519';
            ctx.font = '800 25px sans-serif';
            ctx.fillText("വേദി: വാദി ഹറമൈൻ - മലപ്പുറം", 400, 930);

            // ഡൗൺലോഡ് ബട്ടൺ ആക്റ്റീവ് ആക്കുന്നു
            document.getElementById('downloadBtn').style.display = 'inline-flex';
            document.getElementById('downloadBtn').scrollIntoView({ behavior: 'smooth' });
        };
    }

    function downloadImage() {
        const canvas = document.getElementById('inviteCanvas');
        const link = document.createElement('a');
        const name = document.getElementById('userName').value.trim() || 'Samastha_Invitation';
        
        link.download = name + '_Centenary_Invite.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>
</body>
</html>
